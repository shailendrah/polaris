#
# Run the Polaris server (and optionally the CLI) against a host-resident
# Oracle database. Override env vars via shell or .env to point at a
# different Oracle instance.
#

services:

  polaris-server:
    image: apache/polaris:latest
    container_name: polaris-server
    ports:
      - "8181:8181"   # Iceberg REST + management API
      - "8182:8182"   # health / metrics
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      # Tells the server to run the schema script + bootstrap the realm on startup.
      POLARIS_PERSISTENCE_AUTO_BOOTSTRAP_TYPES: relational-jdbc
      QUARKUS_DATASOURCE_DB_KIND: oracle
      # ADW connection: thin driver reads tnsnames.ora + ojdbc.properties + sqlnet.ora
      # from /wallet (bind-mounted below), resolves the alias, and uses the
      # mTLS wallet automatically. Override these env vars from the shell to
      # point at a different DB.
      QUARKUS_DATASOURCE_JDBC_URL: ${QUARKUS_DATASOURCE_JDBC_URL:-jdbc:oracle:thin:@${ADW_CONNECT_ALIAS}?TNS_ADMIN=/wallet}
      QUARKUS_DATASOURCE_USERNAME: ${QUARKUS_DATASOURCE_USERNAME:-POLARIS_SCHEMA}
      QUARKUS_DATASOURCE_PASSWORD: ${QUARKUS_DATASOURCE_PASSWORD:-${POLARIS_SCHEMA_PWD:-Polaris#2026Schema}}
      # Make sure the JDBC driver finds the wallet & ojdbc.properties.
      TNS_ADMIN: /wallet
      POLARIS_REALM_CONTEXT_REALMS: POLARIS
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,${POLARIS_CLIENT_ID:-root},${POLARIS_CLIENT_SECRET:-s3cr3t}
      POLARIS_AUTHENTICATION_TOKEN_BROKER_RSA_KEY_PAIR_PUBLIC_KEY_FILE: /keys/rsa.pub
      POLARIS_AUTHENTICATION_TOKEN_BROKER_RSA_KEY_PAIR_PRIVATE_KEY_FILE: /keys/rsa.key
      polaris.features."ALLOW_INSECURE_STORAGE_TYPES": "true"
      polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES": "[\"FILE\",\"S3\",\"GCS\",\"AZURE\"]"
      polaris.features."DROP_WITH_PURGE_ENABLED": "true"
      # Polaris does NOT vend STS credentials to clients; clients use their own AWS creds.
      polaris.features."SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION": "true"
      # Polaris's own server-side S3 access (bucket existence checks, allowed-
      # location validation, etc.) goes through the AWS SDK. Point it at OCI
      # Object Storage's S3-compat endpoint with OCI Customer Secret Keys so
      # those server-side calls land on the right bucket.
      AWS_ACCESS_KEY_ID: ${OCI_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${OCI_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${OCI_REGION:-us-sanjose-1}
      AWS_DEFAULT_REGION: ${OCI_REGION:-us-sanjose-1}
      # OCI's S3-compat API doesn't accept Content-Encoding: aws-chunked on
      # PutObject. AWS SDK v2 defaults to WHEN_SUPPORTED which always adds
      # chunked encoding + flexible checksums; switch to WHEN_REQUIRED so
      # they're only added when the operation truly needs them.
      AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
      # OCI's vhcompat endpoint (Feb 2026 release) carries a wildcard cert
      # covering bucket subdomains, so the AWS SDK's default virtual-hosted-
      # style addressing works without TLS errors. No path-style flags
      # needed.
      AWS_ENDPOINT_URL_S3: https://vhcompat.objectstorage.${OCI_REGION}.oci.customer-oci.com
      QUARKUS_LOG_CATEGORY__ORG_HIBERNATE_VALIDATOR__LEVEL: ERROR
      QUARKUS_LOG_CATEGORY__IO_MICROMETER_CORE_INSTRUMENT__LEVEL: ERROR
      QUARKUS_OTEL_SDK_DISABLED: "true"
      QUARKUS_MICROMETER_ENABLED: "false"
    volumes:
      - ./.dev/keys:/keys:ro
      # mTLS wallet for ADW. Read-only mount; the wallet on the host is the
      # one downloaded from OCI Console -> DB Connection -> Download Wallet.
      - ${HOME}/.oracle/wallets/adw:/wallet:ro
    extra_hosts:
      # Allow `host.docker.internal` to resolve on Linux too (no-op on macOS/Windows where it's built in).
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

  polaris-cli:
    image: apache/polaris-cli:latest
    profiles: ["cli"]                  # only starts when invoked via `--profile cli`
    depends_on:
      polaris-server:
        condition: service_healthy
    environment:
      # The CLI reads these specific env var names (no POLARIS_ prefix).
      CLIENT_ID: ${POLARIS_CLIENT_ID:-root}
      CLIENT_SECRET: ${POLARIS_CLIENT_SECRET:-s3cr3t}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
